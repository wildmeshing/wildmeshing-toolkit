name: Test PyPI

on:
  # release:
  #   types: [published]
  pull_request:
  push:
    branches: [main]

jobs:
  build_wheels:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: pypa/cibuildwheel@v2.22

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install build

      - run: python -m build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    needs:
      - build_wheels
      - build_sdist

    runs-on: ubuntu-latest

    environment:
      name: testpypi

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: "*"
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
